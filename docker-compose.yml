version: '3.8'

services:
  # Redis for job queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI (usa Edge TTS - não precisa de container adicional)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/output:/app/output
      - ./data/db:/app/db
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker para processar jobs em background
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m backend.workers.podcast_worker
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/output:/app/output
      - ./data/db:/app/db
    env_file:
      - .env
    depends_on:
      - redis
      - backend

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis_data:
